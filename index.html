<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For My Queen ❤️</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="glass-card text-center animate__animated animate__fadeIn">
            <h1 class="main-title dancing-font mb-4">Happy Birthday, Mau ❤️</h1>

            <div class="position-relative mx-auto mb-4" style="width: 250px; height: 250px; justify-content: center">
                <img src="g.jpeg" id="heroPhoto" class="rounded-circle shadow-lg w-100 h-100" style="object-fit: cover; border: 5px solid white" />
            </div>

            <p class="lead mb-4 px-md-5">
                "In your smile, I see something more beautiful than the stars."
            </p>

            <!-- Impactful Counter -->
            <div class="row g-3 mb-5">
                <div class="col-4">
                    <div class="p-2 bg-white bg-opacity-50 rounded-3">
                        <h3 id="daysCount" class="mb-0 text-pink">0</h3>
                        <small>Days</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="p-2 bg-white bg-opacity-50 rounded-3">
                        <h3 id="hoursCount" class="mb-0">0</h3>
                        <small>Hours</small>
                    </div>
                </div>
                <div class="col-4">
                    <div class="p-2 bg-white bg-opacity-50 rounded-3">
                        <h3 id="minutesCount" class="mb-0">0</h3>
                        <small>Mins</small>
                    </div>
                </div>
                <p class="mt-3 text-muted" style="font-size: 0.9rem">
                    ...of pure happiness with you
                </p>
            </div>

            <div class="d-flex flex-wrap justify-content-center gap-3">
                <a href="story.html" class="btn-romantic">Our Story 💌</a>
                <a href="birthday.html" class="btn-romantic">The Surprise 🎂</a>
            </div>
        </div>
    </div>

    <script>
        // Set the date you first met or started dating
        const startDate = new Date("2025-09-15"); // UPDATE THIS DATE

        function updateCounter() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);

            document.getElementById("daysCount").innerText = days;
            document.getElementById("hoursCount").innerText = hours;
            document.getElementById("minutesCount").innerText = minutes;
        }
        // setInterval(updateCounter, 1000);
        updateCounter();

        //         img.style.opacity = 1;

    </script>
</body>

</html>

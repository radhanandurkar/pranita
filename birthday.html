<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Dream for Mau ❤️</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
      :root {
        --dreamy-pink: #ffdce5;
        --dreamy-purple: #eee1ff;
        --soft-white: rgba(255, 255, 255, 0.6);
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Quicksand", sans-serif;
        background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
        min-height: 100vh;
        overflow-x: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Animated Mesh Gradient Background */
      .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            circle at 20% 30%,
            var(--dreamy-pink) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            var(--dreamy-purple) 0%,
            transparent 40%
          ),
          radial-gradient(circle at 50% 50%, #fff9e6 0%, transparent 50%);
        z-index: -1;
        filter: blur(60px);
        animation: moveGlow 15s ease infinite alternate;
      }

      @keyframes moveGlow {
        0% {
          transform: scale(1) translate(0, 0);
        }
        100% {
          transform: scale(1.1) translate(20px, 30px);
        }
      }

      /* Floating Bokeh Particles */
      .bokeh {
        position: fixed;
        width: 15px;
        height: 15px;
        background: white;
        border-radius: 50%;
        opacity: 0.3;
        filter: blur(2px);
        z-index: -1;
        animation: floatSlow 20s infinite linear;
      }

      @keyframes floatSlow {
        from {
          transform: translateY(100vh) translateX(0);
        }
        to {
          transform: translateY(-10vh) translateX(50px);
        }
      }

      /* Main Container */
      .content-wrapper {
        text-align: center;
        z-index: 1;
      }

      .dreamy-title {
        font-family: "Dancing Script", cursive;
        font-size: 4rem;
        color: #7d5a5a;
        margin-bottom: 10px;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        opacity: 0;
        animation: fadeInBlur 2s forwards;
      }

      @keyframes fadeInBlur {
        from {
          opacity: 0;
          filter: blur(10px);
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          filter: blur(0);
          transform: translateY(0);
        }
      }

      /* Glassmorphism Card */
      .surprise-box {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 40px;
        padding: 40px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05);
        max-width: 450px;
        margin: 20px;
        transform: scale(0.9);
        opacity: 0;
        animation: cardReveal 1.5s 0.8s forwards cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes cardReveal {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .hero-img-wrap {
        position: relative;
        width: 180px;
        height: 180px;
        margin: 0 auto 30px;
      }

      .hero-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
        border: 5px solid white;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .glow-ring {
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
        border: 2px solid white;
        border-radius: 50%;
        animation: pulseRing 3s infinite;
      }

      @keyframes pulseRing {
        0% {
          transform: scale(0.9);
          opacity: 1;
        }
        100% {
          transform: scale(1.2);
          opacity: 0;
        }
      }

      .message-text {
        font-size: 1.1rem;
        color: #6d6d6d;
        line-height: 1.8;
        margin-bottom: 30px;
      }

      /* Dreamy Button */
      .btn-dreamy {
        background: white;
        color: #7d5a5a;
        border: none;
        padding: 12px 40px;
        border-radius: 30px;
        font-weight: 500;
        letter-spacing: 1px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        transition: 0.5s;
        cursor: pointer;
      }

      .btn-dreamy:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        letter-spacing: 2px;
      }

      /* Confetti modification for a "soft" look */
      .sparkle {
        position: fixed;
        pointer-events: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>

    <div class="content-wrapper">
      <h1 class="dreamy-title">Happy Birthday, Mau</h1>

      <div class="surprise-box">
        <div class="hero-img-wrap">
          <div class="glow-ring"></div>
          <img src="g.jpeg" class="hero-img" alt="Your Love" />
        </div>

        <p class="message-text">
          "In a world full of temporary things, you are a feeling that I want to
          keep forever. May your day be as soft as your smile and as bright as
          your heart."
        </p>

        <button
          onclick="window.location.href = 'letter.html'"
          class="btn-dreamy"
        >
          With Love ✨
        </button>
      </div>

      <div class="mt-4">
        <a
          href="index.html"
          style="
            color: #999;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
          "
          >BACK TO HOME</a
        >
      </div>
    </div>

    <script>
      // Create soft bokeh particles
      for (let i = 0; i < 15; i++) {
        let bokeh = document.createElement("div");
        bokeh.className = "bokeh";
        bokeh.style.left = Math.random() * 100 + "vw";
        bokeh.style.width = bokeh.style.height = Math.random() * 20 + 10 + "px";
        bokeh.style.animationDelay = Math.random() * 20 + "s";
        bokeh.style.opacity = Math.random() * 0.4;
        document.body.appendChild(bokeh);
      }

      function dreamyCelebration() {
        const duration = 4 * 1000;
        const end = Date.now() + duration;

        (function frame() {
          // Soft colored confetti (pastel pinks and whites)
          confetti({
            particleCount: 2,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
            colors: ["#ffdce5", "#ffffff", "#eee1ff"],
          });
          confetti({
            particleCount: 2,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
            colors: ["#ffdce5", "#ffffff", "#eee1ff"],
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        })();
      }
    </script>
  </body>
</html>
